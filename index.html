<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Безопасность паролей</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>
  </head>
  <body>
    <div class="min-h-screen">
      <div class="container">
        <div class="card">
          <div class="header">
            <a
              href="https://t.me/astermaneiro"
              target="_blank"
              rel="noopener noreferrer"
              class="icon-button"
              title="Связаться в Telegram"
            >
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </a>
            <h1 class="title">Безопасность</h1>
            <p class="subtitle">Анализируйте и создавайте надежные пароли.</p>
          </div>

          <div class="tabs">
            <button class="tab-btn active" data-tab="analyze">Анализ</button>
            <button class="tab-btn" data-tab="generate">Генератор</button>
          </div>

          <!-- Analyzer Tab -->
          <div class="tab-content active" id="analyze-tab">
            <div class="input-wrapper">
              <input
                type="password"
                id="password-input"
                placeholder="Ваш пароль"
                class="password-input"
                autocomplete="off"
              />
              <button id="toggle-visibility" class="toggle-btn" aria-label="Показать пароль">
                <svg class="icon icon-sm" id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="icon icon-sm hidden" id="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>

            <div class="time-display">
              <span class="time-label">Время на взлом</span>
              <div id="time-value" class="time-value">Введите пароль</div>
              <div id="feedback" class="feedback hidden"></div>
            </div>

            <div class="strength-bars">
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
            </div>

            <div class="stats-grid">
              <div class="stat-card">
                <div id="char-count" class="stat-value">0</div>
                <div class="stat-label">Символов</div>
              </div>
              <div class="stat-card">
                <div id="pool-size" class="stat-value">0</div>
                <div class="stat-label">Алфавит</div>
              </div>
            </div>
          </div>

          <!-- Generator Tab -->
          <div class="tab-content" id="generate-tab">
            <div class="generator-content">
              <div class="slider-group">
                <div class="slider-header">
                  <label class="slider-label">Длина пароля</label>
                  <span id="length-value" class="slider-value">16</span>
                </div>
                <input
                  type="range"
                  id="length-slider"
                  min="8"
                  max="64"
                  value="16"
                  class="slider"
                />
              </div>

              <div class="options-grid">
                <label class="option-card">
                  <input type="checkbox" id="opt-lower" checked class="option-checkbox" />
                  <span class="option-text">a-z</span>
                </label>
                <label class="option-card">
                  <input type="checkbox" id="opt-upper" checked class="option-checkbox" />
                  <span class="option-text">A-Z</span>
                </label>
                <label class="option-card">
                  <input type="checkbox" id="opt-numbers" checked class="option-checkbox" />
                  <span class="option-text">0-9</span>
                </label>
                <label class="option-card">
                  <input type="checkbox" id="opt-symbols" checked class="option-checkbox" />
                  <span class="option-text">!@#$</span>
                </label>
              </div>

              <button id="generate-btn" class="generate-btn">
                <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M23 4v6h-6"></path>
                  <path d="M1 20v-6h6"></path>
                  <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                Сгенерировать
              </button>

              <div id="passwords-list" class="passwords-list"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
